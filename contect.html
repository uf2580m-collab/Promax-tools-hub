<body>

    <!-- =========================================

         ========================================= -->

    <div id="loader">

        <div class="loader-spinner"></div>

    <!-- =========================================

        <div class="logo">

    <!-- =========================================

    <section class="hero">

    <!-- =========================================
         CONTACT FORM
         ========================================= -->

    <section>

        <h2>

            Send Us a Message

        </h2>

        <form>

            <input
                type="text"
                placeholder="Your Name"
                required>

            <input
                type="email"
                placeholder="Your Email"
                required>

            <input
                type="text"
                placeholder="Subject"
                required>

            <textarea
                rows="8"
                placeholder="Write your message here..."
                required></textarea>

            <button type="submit">

                Send Message

            </button>
