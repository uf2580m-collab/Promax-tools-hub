<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator | ProMax Tools Hub</title>

<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">
<link rel="stylesheet" href="../../assets/css/animations.css">
<link rel="stylesheet" href="../../assets/css/dark-mode.css">
<link rel="stylesheet" href="../../assets/css/tool-page.css">

</head>

<body>

<header class="header">

    <div class="logo">
        ProMax Tools
    </div>

    <nav class="nav">

        <a href="../../index.html">Home</a>

    </nav>

    <button id="themeToggle">
        Theme
    </button>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>
            Password Generator
        </h1>

        <p>
            Generate secure passwords instantly.
        </p>

    </div>

</section>

<section
style="
max-width:900px;
margin:auto;
padding:40px;
">

    <label>
        Password Length
    </label>

    <br>

    <input
        type="range"
        id="length"
        min="6"
        max="64"
        value="16">

    <span id="lengthValue">
        16
    </span>

    <br><br>

    <label>
        <input type="checkbox" id="uppercase" checked>
        Uppercase Letters
    </label>

    <br>

    <label>
        <input type="checkbox" id="lowercase" checked>
        Lowercase Letters
    </label>

    <br>

    <label>
        <input type="checkbox" id="numbers" checked>
        Numbers
    </label>

    <br>

    <label>
        <input type="checkbox" id="symbols" checked>
        Symbols
    </label>

    <br><br>

    <button id="generateBtn">
        Generate Password
    </button>

    <button id="copyBtn">
        Copy
    </button>

    <br><br>

    <textarea
        id="passwordOutput"
        rows="3"
        style="width:100%;"
        readonly>
    </textarea>

    <br><br>

    <h3>
        Strength
    </h3>

    <div
        id="strength"
        style="
        font-weight:bold;
        ">
        Medium
    </div>

</section>

<footer>

    <p>
        © <span id="currentYear">2026</span>
        ProMax Tools Hub
    </p>

</footer>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/darkmode.js"></script>
<script src="../../assets/js/ui.js"></script>
<script src="../../assets/js/tools.js"></script>

<script>

const length =
    document.getElementById("length");

const lengthValue =
    document.getElementById("lengthValue");

const output =
    document.getElementById("passwordOutput");

const strength =
    document.getElementById("strength");

length.addEventListener(
    "input",
    () => {

        lengthValue.textContent =
            length.value;

    }
);

function generatePassword() {

    const upper =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const lower =
        "abcdefghijklmnopqrstuvwxyz";

    const nums =
        "0123456789";

    const syms =
        "!@#$%^&*()_+-=[]{}";

    let chars = "";

    if (
        document.getElementById(
            "uppercase"
        ).checked
    ) chars += upper;

    if (
        document.getElementById(
            "lowercase"
        ).checked
    ) chars += lower;

    if (
        document.getElementById(
            "numbers"
        ).checked
    ) chars += nums;

    if (
        document.getElementById(
            "symbols"
        ).checked
    ) chars += syms;

    if (!chars) {

        alert(
            "Select at least one option."
        );

        return;

    }

    let password = "";

    for (
        let i = 0;
        i < Number(length.value);
        i++
    ) {

        password +=
            chars[
                Math.floor(
                    Math.random() *
                    chars.length
                )
            ];

    }

    output.value =
        password;

    updateStrength(password);

}

function updateStrength(password) {

    if (
        password.length < 10
    ) {

        strength.textContent =
            "Weak";

    } else if (
        password.length < 20
    ) {

        strength.textContent =
            "Medium";

    } else {

        strength.textContent =
            "Strong";

    }

}

document
.getElementById("generateBtn")
.addEventListener(
    "click",
    generatePassword
);

document
.getElementById("copyBtn")
.addEventListener(
    "click",
    async () => {

        if (!output.value)
            return;

        await navigator
        .clipboard
        .writeText(
            output.value
        );

        alert(
            "Password Copied"
        );

    }
);

generatePassword();

</script>

</body>

</html>
