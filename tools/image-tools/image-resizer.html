<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Resizer | ProMax Tools Hub</title>

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/dark-mode.css">

</head>

<body>

    <header class="header">

        <div class="logo">
            ProMax Tools
        </div>

        <nav class="nav">

            <a href="../../index.html">Home</a>
            <a href="../../pages/categories/image-tools.html">Image Tools</a>

        </nav>

        <button id="themeToggle">
            Theme
        </button>

    </header>

    <section class="hero">

        <div class="hero-content">

            <h1>
                Image Resizer
            </h1>

            <p>
                Resize images directly in your browser.
            </p>

        </div>

    </section>

    <section
        style="
        max-width:900px;
        margin:auto;
        padding:40px;
        ">

        <input
            type="file"
            id="imageInput"
            accept="image/*">

        <br><br>

        <label>Width (px)</label>

        <br>

        <input
            type="number"
            id="widthInput"
            placeholder="Width">

        <br><br>

        <label>Height (px)</label>

        <br>

        <input
            type="number"
            id="heightInput"
            placeholder="Height">

        <br><br>

        <label>

            <input
                type="checkbox"
                id="lockRatio"
                checked>

            Lock Aspect Ratio

        </label>

        <br><br>

        <img
            id="preview"
            style="
            max-width:100%;
            display:none;
            border-radius:16px;
            ">

        <br><br>

        <button id="resizeBtn">
            Resize Image
        </button>

        <a
            id="downloadBtn"
            style="
            display:none;
            margin-left:10px;
            ">
            Download
        </a>

    </section>

    <footer>

        <p>
            © <span id="currentYear">2026</span>
            ProMax Tools Hub
        </p>

    </footer>

    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/darkmode.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/tools.js"></script>

    <script>

        const imageInput =
            document.getElementById(
                "imageInput"
            );

        const preview =
            document.getElementById(
                "preview"
            );

        const widthInput =
            document.getElementById(
                "widthInput"
            );

        const heightInput =
            document.getElementById(
                "heightInput"
            );

        const lockRatio =
            document.getElementById(
                "lockRatio"
            );

        const resizeBtn =
            document.getElementById(
                "resizeBtn"
            );

        const downloadBtn =
            document.getElementById(
                "downloadBtn"
            );

        let originalWidth = 0;
        let originalHeight = 0;

        imageInput.addEventListener(
            "change",
            event => {

                const file =
                    event.target.files[0];

                if (!file) return;

                const reader =
                    new FileReader();

                reader.onload = e => {

                    preview.src =
                        e.target.result;

                    preview.style.display =
                        "block";

                    const img =
                        new Image();

                    img.onload = () => {

                        originalWidth =
                            img.width;

                        originalHeight =
                            img.height;

                        widthInput.value =
                            img.width;

                        heightInput.value =
                            img.height;

                    };

                    img.src =
                        e.target.result;

                };

                reader.readAsDataURL(
                    file
                );

            }
        );

        widthInput.addEventListener(
            "input",
            () => {

                if (
                    !lockRatio.checked ||
                    !originalWidth
                ) return;

                const ratio =
                    originalHeight /
                    originalWidth;

                heightInput.value =
                    Math.round(
                        widthInput.value *
                        ratio
                    );

            }
        );

        resizeBtn.addEventListener(
            "click",
            () => {

                if (!preview.src)
                    return;

                const img =
                    new Image();

                img.onload = () => {

                    const canvas =
                        document.createElement(
                            "canvas"
                        );

                    canvas.width =
                        Number(
                            widthInput.value
                        );

                    canvas.height =
                        Number(
                            heightInput.value
                        );

                    const ctx =
                        canvas.getContext(
                            "2d"
                        );

                    ctx.drawImage(
                        img,
                        0,
                        0,
                        canvas.width,
                        canvas.height
                    );

                    const output =
                        canvas.toDataURL(
                            "image/png"
                        );

                    downloadBtn.href =
                        output;

                    downloadBtn.download =
                        "resized-image.png";

                    downloadBtn.style.display =
                        "inline-block";

                };

                img.src =
                    preview.src;

            }
        );

    </script>

</body>

</html>
