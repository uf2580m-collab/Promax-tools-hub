<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Converter | ProMax Tools Hub</title>

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/dark-mode.css">

</head>

<body>

    <header class="header">

        <div class="logo">
            ProMax Tools
        </div>

        <nav class="nav">

            <a href="../../index.html">Home</a>
            <a href="../../pages/categories/image-tools.html">Image Tools</a>

        </nav>

        <button id="themeToggle">
            Theme
        </button>

    </header>

    <section class="hero">

        <div class="hero-content">

            <h1>Image Converter</h1>

            <p>
                Convert images between PNG, JPG and WEBP formats.
            </p>

        </div>

    </section>

    <section
        style="
        max-width:900px;
        margin:auto;
        padding:40px;
        ">

        <input
            type="file"
            id="imageInput"
            accept="image/*">

        <br><br>

        <label>Convert To</label>

        <br>

        <select id="formatSelect">

            <option value="image/png">
                PNG
            </option>

            <option value="image/jpeg">
                JPG
            </option>

            <option value="image/webp">
                WEBP
            </option>

        </select>

        <br><br>

        <img
            id="preview"
            style="
            max-width:100%;
            display:none;
            border-radius:16px;
            ">

        <br><br>

        <button id="convertBtn">
            Convert Image
        </button>

        <a
            id="downloadBtn"
            style="
            display:none;
            margin-left:10px;
            ">
            Download
        </a>

    </section>

    <footer>

        <p>
            © <span id="currentYear">2026</span>
            ProMax Tools Hub
        </p>

    </footer>

    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/darkmode.js"></script>
    <script src="../../assets/js/ui.js"></script>
    <script src="../../assets/js/tools.js"></script>

    <script>

        const imageInput =
            document.getElementById("imageInput");

        const preview =
            document.getElementById("preview");

        const formatSelect =
            document.getElementById("formatSelect");

        const convertBtn =
            document.getElementById("convertBtn");

        const downloadBtn =
            document.getElementById("downloadBtn");

        imageInput.addEventListener(
            "change",
            event => {

                const file =
                    event.target.files[0];

                if (!file) return;

                const reader =
                    new FileReader();

                reader.onload = e => {

                    preview.src =
                        e.target.result;

                    preview.style.display =
                        "block";

                };

                reader.readAsDataURL(file);

            }
        );

        convertBtn.addEventListener(
            "click",
            () => {

                if (!preview.src)
                    return;

                const img =
                    new Image();

                img.onload = () => {

                    const canvas =
                        document.createElement(
                            "canvas"
                        );

                    canvas.width =
                        img.width;

                    canvas.height =
                        img.height;

                    const ctx =
                        canvas.getContext(
                            "2d"
                        );

                    ctx.drawImage(
                        img,
                        0,
                        0
                    );

                    const selectedFormat =
                        formatSelect.value;

                    const output =
                        canvas.toDataURL(
                            selectedFormat,
                            1
                        );

                    let extension =
                        "png";

                    if (
                        selectedFormat ===
                        "image/jpeg"
                    ) {

                        extension = "jpg";

                    }

                    if (
                        selectedFormat ===
                        "image/webp"
                    ) {

                        extension = "webp";

                    }

                    downloadBtn.href =
                        output;

                    downloadBtn.download =
                        "converted-image." +
                        extension;

                    downloadBtn.style.display =
                        "inline-block";

                };

                img.src =
                    preview.src;

            }
        );

    </script>

</body>

</html>
